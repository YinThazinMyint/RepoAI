spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/repoai}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=repo
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-name-attribute=login

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

app.frontend-url=http://localhost:3000
app.jwt.secret=${APP_JWT_SECRET:change-me-in-local-development-only}
app.jwt.expiration-ms=86400000
openai.api.key=${OPENAI_API_KEY:}
openai.base-url=https://openrouter.ai/api/v1
openai.model=openai/gpt-3.5-turbo
openai.embedding-model=text-embedding-3-small

rag.chunk.max-chars=3000
rag.chunk.overlap-chars=400
rag.retrieval.top-k=6

# JPA properties for Hibernate dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
