spring.application.name=backend
spring.config.import=optional:file:./src/main/resources/application-local.properties

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/repoai}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

app.frontend-url=http://localhost:3000
app.jwt.secret=${APP_JWT_SECRET:change-me-in-local-development-only}
app.jwt.expiration-ms=86400000
openai.api.key=${OPENAI_API_KEY:}
openai.base-url=https://openrouter.ai/api/v1
openai.model=openai/gpt-3.5-turbo
openai.embedding-model=text-embedding-3-small

rag.chunk.max-chars=3000
rag.chunk.overlap-chars=400
rag.retrieval.top-k=6

# JPA properties for Hibernate dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
